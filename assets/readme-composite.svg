<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <!-- Background banner -->
  <defs>
    <style>
      .title { font: 56px "Segoe UI", Roboto, Arial; fill: #ffffff; font-weight:700; }
      .subtitle { font:20px "Segoe UI", Roboto, Arial; fill:#ff6666; }
      .text { font:14px "Segoe UI", Roboto, Arial; fill:#ddd; }
      .muted { fill:#bbb; }
      .stat-number { font:20px "Segoe UI", Roboto, Arial; fill:#ff6666; font-weight:700; }
    </style>
  </defs>

  <!-- background image (banner) -->
  <image href="https://raw.githubusercontent.com/Pratim04/Pratim04/main/assets/01_banner.png" x="0" y="0" width="1400" height="900" preserveAspectRatio="xMidYMid slice" />

  <!-- dark overlay for better contrast -->
  <rect x="0" y="0" width="1400" height="900" fill="#000" fill-opacity="0.45" />

  <!-- left info panel -->
  <rect x="40" y="90" width="520" height="700" rx="12" fill="#0b0b0b" fill-opacity="0.65" stroke="#2d2d2d" stroke-width="2" />

  <!-- profile image -->
  <image href="https://raw.githubusercontent.com/Pratim04/Pratim04/main/assets/02_profile.png" x="80" y="110" width="160" height="160" preserveAspectRatio="xMidYMid slice" clip-path="" />

  <!-- name & tagline -->
  <text x="260" y="150" class="title">PRATIM HALDER</text>
  <text x="260" y="188" class="subtitle">Code. Debug. Conquer.</text>

  <!-- contact lines -->
  <text x="80" y="300" class="text">📍 Kolkata, India</text>
  <text x="80" y="325" class="text">✉️ pratimhalder2004@gmail.com</text>
  <text x="80" y="350" class="text">🔗 github.com/pratim04</text>

  <!-- battle statistics box -->
  <rect x="80" y="380" width="440" height="180" rx="8" fill="#050505" fill-opacity="0.6" stroke="#3a3a3a" stroke-width="1" />
  <text x="100" y="410" class="text" style="font-weight:700;">⚔ BATTLE STATISTICS</text>

  <text x="100" y="440" class="text">Total Commits</text>
  <text x="420" y="440" class="stat-number">1.2k+</text>

  <text x="100" y="470" class="text">Pull Requests</text>
  <text x="420" y="470" class="stat-number">180+</text>

  <text x="100" y="500" class="text">Issues Solved</text>
  <text x="420" y="500" class="stat-number">160+</text>

  <text x="100" y="530" class="text">Repositories</text>
  <text x="420" y="530" class="stat-number">35+</text>

  <text x="100" y="560" class="text">Stars Earned</text>
  <text x="420" y="560" class="stat-number">450+</text>

  <!-- code panel image -->
  <image href="https://raw.githubusercontent.com/Pratim04/Pratim04/main/assets/06_code-panel.png" x="80" y="590" width="440" height="140" preserveAspectRatio="xMidYMid slice" />

  <!-- right panels -->
  <rect x="600" y="60" width="760" height="520" rx="12" fill="#050505" fill-opacity="0.55" stroke="#2b2b2b" stroke-width="2" />

  <!-- contribution graph -->
  <text x="620" y="100" class="text" style="font-weight:700;">* CONTRIBUTION GRAPH *</text>
  <image href="https://github-readme-activity-graph.vercel.app/graph?username=pratim04&theme=github-dark&area=true&hide_border=true" x="620" y="120" width="720" height="200" preserveAspectRatio="xMidYMid meet" />

  <!-- current streak and languages -->
  <rect x="620" y="330" width="340" height="190" rx="8" fill="#0b0b0b" fill-opacity="0.6" stroke="#353535" />
  <text x="640" y="360" class="text" style="font-weight:700;">🔥 CURRENT STREAK</text>
  <text x="640" y="395" class="stat-number">28 days</text>
  <text x="640" y="425" class="text muted">Best Streak: 42 days</text>

  <rect x="980" y="330" width="360" height="190" rx="8" fill="#0b0b0b" fill-opacity="0.6" stroke="#353535" />
  <text x="1000" y="360" class="text" style="font-weight:700;">★ LANGUAGES</text>
  <image href="https://github-readme-stats.vercel.app/api/top-langs/?username=pratim04&layout=compact&theme=dark" x="1000" y="380" width="320" height="110" preserveAspectRatio="xMidYMid meet" />

  <!-- activity overview chart -->
  <text x="620" y="540" class="text" style="font-weight:700;">ACTIVITY OVERVIEW</text>
  <image href="https://github-readme-stats.vercel.app/api?username=pratim04&show_icons=true&theme=dark&hide_border=true" x="620" y="560" width="720" height="220" preserveAspectRatio="xMidYMid meet" />

  <!-- footer strip -->
  <image href="https://raw.githubusercontent.com/Pratim04/Pratim04/main/assets/10_footer.png" x="40" y="810" width="1320" height="80" preserveAspectRatio="xMidYMid slice" />

  <!-- motto -->
  <text x="700" y="860" class="text" text-anchor="middle">THE ONLY LIMIT IS THE ONE YOU SET YOURSELF.</text>

</svg>
